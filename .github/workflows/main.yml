name: 每日自动抓取论文

on:
  schedule:
    # 这里的 Cron 语法是 UTC 时间。
    # UTC 2点 = 北京时间早上 10点。
    - cron: '0 2 * * *' 
  workflow_dispatch: # 这个指令允许你随时手动点击运行测试

jobs:
  run-agent:
    runs-on: ubuntu-latest # GitHub 免费分配的最新版 Linux 服务器

    steps:
    - name: 1. 检出你的代码
      uses: actions/checkout@v4

    - name: 2. 安装 Python 环境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 3. 安装依赖库
      run: pip install -r requirements.txt

    - name: 4. 唤醒 Agent，开始执行！
      env:
        # 这一步会自动从保险箱里取出密码，塞给代码使用
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
      run: python main.py
